<!DOCTYPE html>

<html>

<head>
    <title>Register</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
            background: #2c2c2c;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4caf50;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        a {
            color: #4caf50;
            text-decoration: none;
            font-size: 14px;
        }

        #error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Register</h2>

        <input id="name" placeholder="Name" />
        <input id="username" placeholder="Username" />
        <input id="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />

        <button onclick="register()">Register</button>

        <p id="error"></p>

        <p>Already have an account? <a href="login.html">Login</a></p>

    </div>


    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
